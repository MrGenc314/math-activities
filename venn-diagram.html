<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venn Diagram Game · Set Theory Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:        #f6f1e4;
    --paper-warm:   #ede3ce;
    --paper-soft:   #fbf8f0;
    --ink:          #1a1f3a;
    --ink-soft:     #2e355a;
    --ink-faint:    rgba(26, 31, 58, 0.55);
    --rule:         rgba(26, 31, 58, 0.14);
    --accent:       #8b5e2a;
    --accent-soft:  #b08048;
    --shade:        rgba(139, 94, 42, 0.32);
    --shade-hover:  rgba(139, 94, 42, 0.14);
    --correct:      #4a6b3a;
    --correct-shade:rgba(74, 107, 58, 0.32);
    --incorrect:    #8b3a3a;
    --incorrect-shade: rgba(139, 58, 58, 0.32);
    --shadow:       0 2px 18px rgba(26, 31, 58, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--ink);
    background: var(--paper);
    background-image:
      radial-gradient(circle at 15% 8%, rgba(176, 128, 72, 0.08) 0%, transparent 42%),
      radial-gradient(circle at 85% 92%, rgba(26, 31, 58, 0.05) 0%, transparent 45%);
    min-height: 100vh;
    padding: 1.75rem 1rem 3rem;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .app { max-width: 720px; margin: 0 auto; }

  header {
    text-align: center;
    padding-bottom: 1.5rem;
    margin-bottom: 1.5rem;
    position: relative;
  }
  header::after {
    content: "";
    display: block;
    width: 60px;
    height: 1px;
    background: var(--accent);
    margin: 1.2rem auto 0;
  }
  h1 {
    font-family: 'EB Garamond', Georgia, serif;
    font-weight: 500;
    font-size: clamp(1.9rem, 4.5vw, 2.4rem);
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  h1 em { font-style: italic; color: var(--accent); }
  .subtitle {
    font-size: 0.72rem;
    color: var(--ink-faint);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 0.55rem;
    font-weight: 500;
  }

  .controls {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    align-items: flex-end;
  }
  .select-group { display: flex; flex-direction: column; gap: 0.28rem; }
  .select-group label {
    font-size: 0.64rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
    font-weight: 600;
    padding-left: 0.1rem;
  }
  select, button {
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 500;
    padding: 0.55rem 0.9rem;
    border: 1px solid var(--rule);
    border-radius: 4px;
    background: var(--paper-soft);
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  select {
    padding-right: 2rem;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%231a1f3a' stroke-width='1.2' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 0.75rem center;
  }
  select:hover, button:hover { border-color: var(--ink-soft); background-color: white; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--ink); color: var(--paper-soft); border-color: var(--ink); }
  button.primary:hover { background: var(--ink-soft); border-color: var(--ink-soft); }
  button.accent { background: var(--accent); color: var(--paper-soft); border-color: var(--accent); }
  button.accent:hover { background: var(--accent-soft); border-color: var(--accent-soft); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button:disabled:hover { background: var(--paper-soft); border-color: var(--rule); }
  button.primary:disabled:hover { background: var(--ink); border-color: var(--ink); }

  .game-area {
    background: var(--paper-soft);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 1.5rem;
    box-shadow: var(--shadow);
    position: relative;
  }
  .game-area::before {
    content: "";
    position: absolute;
    top: -1px; left: -1px; right: -1px; bottom: -1px;
    border-radius: 8px;
    border: 1px solid rgba(139, 94, 42, 0.08);
    pointer-events: none;
  }

  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 1rem;
    margin-bottom: 1rem;
    border-bottom: 1px solid var(--rule);
    gap: 0.5rem;
  }
  .stat { text-align: center; flex: 1; }
  .stat-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
    font-weight: 600;
    display: block;
    margin-bottom: 0.15rem;
  }
  .stat-value {
    font-family: 'EB Garamond', Georgia, serif;
    font-weight: 500;
    font-size: 1.5rem;
    color: var(--ink);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .stat.time .stat-value { color: var(--accent); }
  .stat.time.low .stat-value { color: var(--incorrect); animation: pulse 0.8s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }

  #venn-container { display: flex; justify-content: center; margin-bottom: 0.4rem; }
  svg.venn {
    width: 100%;
    max-width: 480px;
    height: auto;
    display: block;
    -webkit-user-select: none;
    user-select: none;
  }
  .universe-rect {
    fill: var(--paper-warm);
    stroke: var(--ink);
    stroke-width: 1.2;
    cursor: pointer;
  }
  .circle-outline {
    fill: none;
    stroke: var(--ink);
    stroke-width: 1.6;
    pointer-events: none;
  }
  .region-fill { fill: transparent; transition: fill 0.2s ease; pointer-events: none; }
  .region-fill.selected { fill: var(--shade); }
  .region-fill.solution { fill: var(--correct-shade); }
  .region-fill.error    { fill: var(--incorrect-shade); }

  .set-label {
    font-family: 'EB Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 500;
    font-size: 1.55rem;
    fill: var(--ink);
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    transition: fill 0.15s;
  }
  .set-label:hover { fill: var(--accent); }
  .universe-label {
    font-family: 'EB Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 500;
    font-size: 1.25rem;
    fill: var(--ink);
    pointer-events: none;
  }

  .expression-wrap {
    text-align: center;
    padding: 1rem 0 1.3rem;
    position: relative;
  }
  .expression-wrap::before, .expression-wrap::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 18%;
    height: 1px;
    background: var(--rule);
  }
  .expression-wrap::before { left: 8%; }
  .expression-wrap::after { right: 8%; }
  .expression {
    font-family: 'EB Garamond', Georgia, serif;
    font-weight: 500;
    font-size: clamp(1.7rem, 4.5vw, 2.1rem);
    letter-spacing: 0.02em;
    color: var(--ink);
    line-height: 1.2;
    display: inline-block;
    padding: 0 1rem;
    background: var(--paper-soft);
    position: relative;
  }
  .expression em { font-style: italic; }

  .feedback {
    text-align: center;
    font-size: 0.92rem;
    min-height: 1.6rem;
    margin-bottom: 0.9rem;
    letter-spacing: 0.01em;
    color: var(--ink-faint);
    font-weight: 500;
  }
  .feedback.correct   { color: var(--correct); }
  .feedback.incorrect { color: var(--incorrect); }
  .feedback .glyph {
    font-family: 'EB Garamond', serif;
    font-size: 1.15rem;
    margin-right: 0.25rem;
    font-weight: 600;
  }
  .feedback strong {
    font-family: 'EB Garamond', serif;
    font-weight: 500;
    font-size: 1.05em;
  }

  .buttons {
    display: flex;
    gap: 0.55rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .help-line {
    text-align: center;
    font-size: 0.78rem;
    color: var(--ink-faint);
    margin-top: 1rem;
    padding-top: 0.9rem;
    border-top: 1px solid var(--rule);
    letter-spacing: 0.01em;
  }
  .help-line em { font-family: 'EB Garamond', serif; font-style: italic; }
  .help-line kbd {
    font-family: 'Manrope', sans-serif;
    font-size: 0.72rem;
    padding: 0.1rem 0.4rem;
    background: var(--paper-warm);
    border: 1px solid var(--rule);
    border-radius: 3px;
    font-weight: 600;
  }

  #game-over { display: none; text-align: center; padding: 1.5rem 1rem 0.5rem; }
  #game-over.show { display: block; }
  #game-over h2 {
    font-family: 'EB Garamond', Georgia, serif;
    font-weight: 500;
    font-size: 1.7rem;
    margin-bottom: 0.25rem;
  }
  #game-over .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-faint);
    font-weight: 600;
    margin-top: 1.1rem;
  }
  #game-over .final-score {
    font-family: 'EB Garamond', Georgia, serif;
    font-weight: 500;
    font-size: 3.3rem;
    color: var(--accent);
    line-height: 1;
    margin: 0.3rem 0 0.9rem;
  }
  #game-over .breakdown {
    color: var(--ink-soft);
    margin-bottom: 1.3rem;
    font-size: 0.9rem;
  }
  #game-over .breakdown em { font-family: 'EB Garamond', serif; font-style: italic; }

  @media (max-width: 520px) {
    body { padding: 1rem 0.6rem 2rem; }
    .game-area { padding: 1rem; }
    .stat-value { font-size: 1.25rem; }
    .stat-label { font-size: 0.55rem; }
    .expression { padding: 0 0.5rem; }
    .expression-wrap::before, .expression-wrap::after { width: 10%; }
    header { margin-bottom: 1rem; padding-bottom: 1rem; }
    .controls { gap: 0.5rem; margin-bottom: 1rem; }
    select, button { font-size: 0.82rem; padding: 0.5rem 0.75rem; }
    .help-line { font-size: 0.7rem; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>Venn Diagram <em>Game</em></h1>
    <p class="subtitle">Set Theory Practice</p>
  </header>

  <div class="controls">
    <div class="select-group">
      <label>Difficulty</label>
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
    </div>
    <div class="select-group">
      <label>Sets</label>
      <select id="setCount">
        <option value="2">2 sets</option>
        <option value="3">3 sets</option>
      </select>
    </div>
    <div class="select-group">
      <label>Mode</label>
      <select id="mode">
        <option value="game">Timed game</option>
        <option value="practice">Practice</option>
      </select>
    </div>
    <button id="newGameBtn" class="accent">New Game</button>
  </div>

  <div class="game-area">

    <div id="active-game">
      <div class="stats-bar">
        <div class="stat time" id="stat-time">
          <span class="stat-label">Time</span>
          <span class="stat-value" id="time-display">60s</span>
        </div>
        <div class="stat">
          <span class="stat-label">Question</span>
          <span class="stat-value" id="question-display">1</span>
        </div>
        <div class="stat">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score-display">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Streak</span>
          <span class="stat-value" id="streak-display">0</span>
        </div>
      </div>

      <div id="venn-container"></div>

      <div class="expression-wrap">
        <span class="expression" id="expression-display"></span>
      </div>

      <div class="feedback" id="feedback"></div>

      <div class="buttons">
        <button id="clearBtn">Clear</button>
        <button id="solutionBtn">Show Solution</button>
        <button id="continueBtn" class="primary">Continue →</button>
      </div>

      <div class="help-line">
        Click regions to shade · click <em>A</em>, <em>B</em>, <em>C</em> to shade an entire set · right-click or <kbd>Clear</kbd> to reset · <kbd>Enter</kbd> to submit
      </div>
    </div>

    <div id="game-over">
      <h2 id="game-over-title">Time's up</h2>
      <div class="label">Final Score</div>
      <div class="final-score" id="final-score">0</div>
      <div class="breakdown" id="final-breakdown"></div>
      <button id="playAgainBtn" class="primary">Play Again</button>
    </div>

  </div>
</div>

<script>
"use strict";

// ==============================
// CONFIG
// ==============================
const GAME_DURATION = 60;
const BASE_POINTS   = 10;
const STREAK_BONUS  = 5;
const LOW_TIME = 10;

const SVG_W = 500, SVG_H = 400;
const UNIV = { x: 30, y: 50, w: 440, h: 300 };

// Circle geometries — carefully chosen so (a) all 7 triple regions are visible,
// (b) circles fit within universe, (c) labels have room.
const GEOM = {
  2: {
    A: { cx: 200, cy: 200, r: 92 },
    B: { cx: 300, cy: 200, r: 92 },
  },
  3: {
    A: { cx: 250, cy: 166, r: 78 },
    B: { cx: 208, cy: 240, r: 78 },
    C: { cx: 292, cy: 240, r: 78 },
  },
};

// ==============================
// REGIONS
// ==============================
function getRegions(n) {
  if (n === 2) {
    return [
      { id: 'A',    A: true,  B: false },
      { id: 'B',    A: false, B: true  },
      { id: 'AB',   A: true,  B: true  },
      { id: 'none', A: false, B: false },
    ];
  }
  return [
    { id: 'A',    A: true,  B: false, C: false },
    { id: 'B',    A: false, B: true,  C: false },
    { id: 'C',    A: false, B: false, C: true  },
    { id: 'AB',   A: true,  B: true,  C: false },
    { id: 'AC',   A: true,  B: false, C: true  },
    { id: 'BC',   A: false, B: true,  C: true  },
    { id: 'ABC',  A: true,  B: true,  C: true  },
    { id: 'none', A: false, B: false, C: false },
  ];
}

// ==============================
// EXPRESSIONS
// ==============================
const em = s => `<em>${s}</em>`;
const A = em('A'), B = em('B'), C = em('C');
const cap = '∩', cup = '∪', pr = '′';

const EXPRESSIONS = {
  '2-easy': [
    { html: `${A}`,                    fn: r => r.A },
    { html: `${B}`,                    fn: r => r.B },
    { html: `${A}${pr}`,               fn: r => !r.A },
    { html: `${B}${pr}`,               fn: r => !r.B },
    { html: `${A} ${cap} ${B}`,        fn: r => r.A && r.B },
    { html: `${A} ${cup} ${B}`,        fn: r => r.A || r.B },
  ],
  '2-medium': [
    { html: `${A} ${cap} ${B}${pr}`,             fn: r => r.A && !r.B },
    { html: `${A}${pr} ${cap} ${B}`,             fn: r => !r.A && r.B },
    { html: `${A} ${cup} ${B}${pr}`,             fn: r => r.A || !r.B },
    { html: `${A}${pr} ${cup} ${B}`,             fn: r => !r.A || r.B },
    { html: `(${A} ${cap} ${B})${pr}`,           fn: r => !(r.A && r.B) },
    { html: `(${A} ${cup} ${B})${pr}`,           fn: r => !(r.A || r.B) },
    { html: `${A}${pr} ${cap} ${B}${pr}`,        fn: r => !r.A && !r.B },
    { html: `${A}${pr} ${cup} ${B}${pr}`,        fn: r => !r.A || !r.B },
  ],
  '2-hard': [
    { html: `(${A} ${cap} ${B}${pr}) ${cup} (${A}${pr} ${cap} ${B})`,
      fn: r => (r.A && !r.B) || (!r.A && r.B) },
    { html: `(${A} ${cup} ${B}) ${cap} (${A} ${cap} ${B})${pr}`,
      fn: r => (r.A || r.B) && !(r.A && r.B) },
    { html: `(${A} ${cup} ${B})${pr} ${cup} (${A} ${cap} ${B})`,
      fn: r => !(r.A || r.B) || (r.A && r.B) },
    { html: `(${A}${pr} ${cup} ${B}${pr})${pr}`,
      fn: r => !(!r.A || !r.B) },
    { html: `(${A}${pr} ${cap} ${B}${pr})${pr}`,
      fn: r => !(!r.A && !r.B) },
    { html: `${A} \\ ${B}`,
      fn: r => r.A && !r.B },
    { html: `${B} \\ ${A}`,
      fn: r => r.B && !r.A },
    { html: `(${A} ${cup} ${B}) \\ (${A} ${cap} ${B})`,
      fn: r => (r.A || r.B) && !(r.A && r.B) },
  ],
  '3-easy': [
    { html: `${A}`,                 fn: r => r.A },
    { html: `${B}`,                 fn: r => r.B },
    { html: `${C}`,                 fn: r => r.C },
    { html: `${A}${pr}`,            fn: r => !r.A },
    { html: `${B}${pr}`,            fn: r => !r.B },
    { html: `${C}${pr}`,            fn: r => !r.C },
    { html: `${A} ${cap} ${B}`,     fn: r => r.A && r.B },
    { html: `${A} ${cap} ${C}`,     fn: r => r.A && r.C },
    { html: `${B} ${cap} ${C}`,     fn: r => r.B && r.C },
    { html: `${A} ${cup} ${B}`,     fn: r => r.A || r.B },
    { html: `${A} ${cup} ${C}`,     fn: r => r.A || r.C },
    { html: `${B} ${cup} ${C}`,     fn: r => r.B || r.C },
    { html: `${A} ${cap} ${B} ${cap} ${C}`, fn: r => r.A && r.B && r.C },
    { html: `${A} ${cup} ${B} ${cup} ${C}`, fn: r => r.A || r.B || r.C },
  ],
  '3-medium': [
    { html: `(${A} ${cap} ${B}) ${cup} ${C}`,        fn: r => (r.A && r.B) || r.C },
    { html: `${A} ${cap} (${B} ${cup} ${C})`,        fn: r => r.A && (r.B || r.C) },
    { html: `(${A} ${cup} ${B}) ${cap} ${C}`,        fn: r => (r.A || r.B) && r.C },
    { html: `(${A} ${cup} ${C}) ${cap} ${B}`,        fn: r => (r.A || r.C) && r.B },
    { html: `(${A} ${cup} ${B} ${cup} ${C})${pr}`,   fn: r => !(r.A || r.B || r.C) },
    { html: `(${A} ${cap} ${B} ${cap} ${C})${pr}`,   fn: r => !(r.A && r.B && r.C) },
    { html: `${A}${pr} ${cup} ${B}${pr} ${cup} ${C}${pr}`, fn: r => !r.A || !r.B || !r.C },
    { html: `${A}${pr} ${cap} ${B}${pr} ${cap} ${C}${pr}`, fn: r => !r.A && !r.B && !r.C },
    { html: `${A} ${cap} ${B} ${cap} ${C}${pr}`,     fn: r => r.A && r.B && !r.C },
    { html: `${A} ${cap} ${B}${pr} ${cap} ${C}`,     fn: r => r.A && !r.B && r.C },
    { html: `${A}${pr} ${cap} ${B} ${cap} ${C}`,     fn: r => !r.A && r.B && r.C },
  ],
  '3-hard': [
    { html: `(${A} ${cup} ${B}) ${cap} ${C}${pr}`,   fn: r => (r.A || r.B) && !r.C },
    { html: `${A}${pr} ${cap} (${B} ${cup} ${C})`,   fn: r => !r.A && (r.B || r.C) },
    { html: `(${A}${pr} ${cup} ${B}) ${cap} ${C}`,   fn: r => (!r.A || r.B) && r.C },
    { html: `(${A} ${cup} ${B} ${cup} ${C})${pr} ${cup} (${A} ${cap} ${B} ${cap} ${C})`,
      fn: r => !(r.A || r.B || r.C) || (r.A && r.B && r.C) },
    { html: `(${A} ${cap} ${B}) ${cup} (${B} ${cap} ${C}) ${cup} (${A} ${cap} ${C})`,
      fn: r => (r.A && r.B) || (r.B && r.C) || (r.A && r.C) },
    { html: `${A} ${cap} (${B} ${cup} ${C})${pr}`,   fn: r => r.A && !(r.B || r.C) },
    { html: `(${A} ${cup} ${B})${pr} ${cap} ${C}`,   fn: r => !(r.A || r.B) && r.C },
    { html: `(${A} ${cup} ${B} ${cup} ${C}) ${cap} (${A} ${cap} ${B} ${cap} ${C})${pr}`,
      fn: r => (r.A || r.B || r.C) && !(r.A && r.B && r.C) },
    { html: `${A}${pr} ${cap} ${B}${pr} ${cap} ${C}`, fn: r => !r.A && !r.B && r.C },
    { html: `(${A} ${cap} ${B}${pr}) ${cup} (${A}${pr} ${cap} ${C})`,
      fn: r => (r.A && !r.B) || (!r.A && r.C) },
    { html: `${A} \\ (${B} ${cup} ${C})`,            fn: r => r.A && !(r.B || r.C) },
    { html: `(${A} ${cup} ${B} ${cup} ${C}) \\ (${A} ${cap} ${B} ${cap} ${C})`,
      fn: r => (r.A || r.B || r.C) && !(r.A && r.B && r.C) },
  ],
};

// ==============================
// STATE
// ==============================
const state = {
  setCount: 2,
  difficulty: 'easy',
  mode: 'game',
  selected: new Set(),
  currentExpression: null,
  currentKey: null,
  recentExpressions: [],
  timeLeft: GAME_DURATION,
  score: 0,
  streak: 0,
  bestStreak: 0,
  questionNum: 0,
  correctCount: 0,
  attemptedCount: 0,
  timerInterval: null,
  answered: false,
  gameEnded: false,
};

// ==============================
// RENDERING
// ==============================
function renderVenn() {
  const n = state.setCount;
  const geom = GEOM[n];
  const regions = getRegions(n);
  const names = n === 2 ? ['A', 'B'] : ['A', 'B', 'C'];

  // Defs: clip-path per circle, mask per complement
  let defs = '<defs>';
  for (const name of names) {
    const c = geom[name];
    defs += `<clipPath id="clip${name}" clipPathUnits="userSpaceOnUse"><circle cx="${c.cx}" cy="${c.cy}" r="${c.r}"/></clipPath>`;
  }
  for (const name of names) {
    const c = geom[name];
    defs += `<mask id="maskNot${name}" maskUnits="userSpaceOnUse">
      <rect x="${UNIV.x}" y="${UNIV.y}" width="${UNIV.w}" height="${UNIV.h}" fill="white"/>
      <circle cx="${c.cx}" cy="${c.cy}" r="${c.r}" fill="black"/>
    </mask>`;
  }
  defs += '</defs>';

  const universe = `<rect class="universe-rect" x="${UNIV.x}" y="${UNIV.y}" width="${UNIV.w}" height="${UNIV.h}"/>`;

  let regionsHtml = '';
  for (const region of regions) {
    regionsHtml += buildRegionGroup(region, names);
  }

  let circles = '';
  for (const name of names) {
    const c = geom[name];
    circles += `<circle class="circle-outline" cx="${c.cx}" cy="${c.cy}" r="${c.r}"/>`;
  }

  const labels = renderLabels(n, geom);

  const svg = `<svg class="venn" viewBox="0 0 ${SVG_W} ${SVG_H}" xmlns="http://www.w3.org/2000/svg">
    ${defs}
    ${universe}
    ${regionsHtml}
    ${circles}
    ${labels}
  </svg>`;

  const container = document.getElementById('venn-container');
  container.innerHTML = svg;

  const svgEl = container.querySelector('svg');
  svgEl.addEventListener('click', handleSvgClick);
  svgEl.addEventListener('contextmenu', e => {
    e.preventDefault();
    if (!state.answered && !state.gameEnded) clearAll();
  });

  svgEl.querySelectorAll('.set-label').forEach(label => {
    label.addEventListener('click', e => {
      e.stopPropagation();
      if (state.answered || state.gameEnded) return;
      toggleSet(label.getAttribute('data-set'));
    });
  });
}

function buildRegionGroup(region, names) {
  let inner = `<rect class="region-fill" data-region="${region.id}" x="${UNIV.x}" y="${UNIV.y}" width="${UNIV.w}" height="${UNIV.h}"/>`;
  for (const name of names) {
    if (region[name] === true) {
      inner = `<g clip-path="url(#clip${name})">${inner}</g>`;
    } else {
      inner = `<g mask="url(#maskNot${name})">${inner}</g>`;
    }
  }
  return inner;
}

function renderLabels(n, geom) {
  if (n === 2) {
    return `
      <text class="set-label" data-set="A" x="${geom.A.cx - geom.A.r - 2}" y="${geom.A.cy - geom.A.r + 16}" text-anchor="end">A</text>
      <text class="set-label" data-set="B" x="${geom.B.cx + geom.B.r + 2}" y="${geom.B.cy - geom.B.r + 16}" text-anchor="start">B</text>
      <text class="universe-label" x="${UNIV.x + UNIV.w - 8}" y="${UNIV.y + UNIV.h - 8}" text-anchor="end">U</text>
    `;
  }
  return `
    <text class="set-label" data-set="A" x="${geom.A.cx}" y="${geom.A.cy - geom.A.r - 8}" text-anchor="middle">A</text>
    <text class="set-label" data-set="B" x="${geom.B.cx - geom.B.r - 4}" y="${geom.B.cy + geom.B.r + 18}" text-anchor="end">B</text>
    <text class="set-label" data-set="C" x="${geom.C.cx + geom.C.r + 4}" y="${geom.C.cy + geom.C.r + 18}" text-anchor="start">C</text>
    <text class="universe-label" x="${UNIV.x + UNIV.w - 8}" y="${UNIV.y + UNIV.h - 8}" text-anchor="end">U</text>
  `;
}

// ==============================
// CLICK HANDLING
// ==============================
function handleSvgClick(e) {
  if (state.answered || state.gameEnded) return;
  if (e.target.classList.contains('set-label')) return;

  const svg = e.currentTarget;
  const pt = svg.createSVGPoint();
  pt.x = e.clientX;
  pt.y = e.clientY;
  const p = pt.matrixTransform(svg.getScreenCTM().inverse());

  if (p.x < UNIV.x || p.x > UNIV.x + UNIV.w || p.y < UNIV.y || p.y > UNIV.y + UNIV.h) return;

  const geom = GEOM[state.setCount];
  const inA = inCircle(p, geom.A);
  const inB = inCircle(p, geom.B);
  const inC = state.setCount === 3 ? inCircle(p, geom.C) : false;

  toggleRegion(regionId(inA, inB, inC, state.setCount));
}

function inCircle(p, c) {
  const dx = p.x - c.cx, dy = p.y - c.cy;
  return dx * dx + dy * dy <= c.r * c.r;
}

function regionId(inA, inB, inC, n) {
  if (n === 2) {
    if (inA && inB) return 'AB';
    if (inA) return 'A';
    if (inB) return 'B';
    return 'none';
  }
  if (inA && inB && inC) return 'ABC';
  if (inA && inB) return 'AB';
  if (inA && inC) return 'AC';
  if (inB && inC) return 'BC';
  if (inA) return 'A';
  if (inB) return 'B';
  if (inC) return 'C';
  return 'none';
}

function toggleRegion(id) {
  if (state.selected.has(id)) state.selected.delete(id);
  else state.selected.add(id);
  updateRegionVisuals();
}

function toggleSet(setName) {
  const regions = getRegions(state.setCount);
  const setRegions = regions.filter(r => r[setName] === true).map(r => r.id);
  const allSelected = setRegions.every(id => state.selected.has(id));
  if (allSelected) setRegions.forEach(id => state.selected.delete(id));
  else setRegions.forEach(id => state.selected.add(id));
  updateRegionVisuals();
}

function clearAll() {
  state.selected.clear();
  updateRegionVisuals();
}

function updateRegionVisuals() {
  document.querySelectorAll('.region-fill').forEach(el => {
    el.classList.remove('solution', 'error');
    const id = el.getAttribute('data-region');
    el.classList.toggle('selected', state.selected.has(id));
  });
}

function showSolutionFill() {
  const regions = getRegions(state.setCount);
  const correctIds = new Set(regions.filter(r => state.currentExpression.fn(r)).map(r => r.id));
  document.querySelectorAll('.region-fill').forEach(el => {
    el.classList.remove('selected', 'solution', 'error');
    const id = el.getAttribute('data-region');
    if (correctIds.has(id)) el.classList.add('solution');
  });
}

function showDiffFill() {
  const regions = getRegions(state.setCount);
  regions.forEach(r => {
    const el = document.querySelector(`.region-fill[data-region="${r.id}"]`);
    if (!el) return;
    el.classList.remove('selected', 'solution', 'error');
    const correct = state.currentExpression.fn(r);
    const selected = state.selected.has(r.id);
    if (correct) el.classList.add('solution');
    else if (selected) el.classList.add('error');
  });
}

// ==============================
// GAME LOGIC
// ==============================
function newGame() {
  state.setCount   = parseInt(document.getElementById('setCount').value, 10);
  state.difficulty = document.getElementById('difficulty').value;
  state.mode       = document.getElementById('mode').value;
  state.selected.clear();
  state.currentKey = `${state.setCount}-${state.difficulty}`;
  state.recentExpressions = [];
  state.score = 0;
  state.streak = 0;
  state.bestStreak = 0;
  state.questionNum = 0;
  state.correctCount = 0;
  state.attemptedCount = 0;
  state.timeLeft = GAME_DURATION;
  state.answered = false;
  state.gameEnded = false;

  document.getElementById('active-game').style.display = '';
  document.getElementById('game-over').classList.remove('show');
  document.getElementById('stat-time').classList.remove('low');

  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }

  // Hide timer + streak differently for practice mode
  document.getElementById('stat-time').style.visibility = state.mode === 'game' ? 'visible' : 'hidden';

  renderVenn();
  loadQuestion();
  updateDisplays();

  if (state.mode === 'game') {
    state.timerInterval = setInterval(tick, 1000);
  }
}

function tick() {
  state.timeLeft--;
  if (state.timeLeft <= LOW_TIME) {
    document.getElementById('stat-time').classList.add('low');
  }
  updateDisplays();
  if (state.timeLeft <= 0) {
    endGame();
  }
}

function loadQuestion() {
  const pool = EXPRESSIONS[state.currentKey];
  let expr;
  const avoidCount = Math.min(4, Math.floor(pool.length / 2));
  let attempts = 0;
  do {
    expr = pool[Math.floor(Math.random() * pool.length)];
    attempts++;
  } while (attempts < 20 && state.recentExpressions.includes(expr));
  state.recentExpressions.push(expr);
  if (state.recentExpressions.length > avoidCount) state.recentExpressions.shift();

  state.currentExpression = expr;
  state.selected.clear();
  state.answered = false;
  state.questionNum++;

  document.getElementById('expression-display').innerHTML = expr.html;
  const fb = document.getElementById('feedback');
  fb.textContent = '';
  fb.className = 'feedback';
  document.getElementById('continueBtn').textContent = 'Continue →';
  document.getElementById('continueBtn').disabled = false;
  document.getElementById('solutionBtn').disabled = false;
  document.getElementById('clearBtn').disabled = false;

  updateRegionVisuals();
  updateDisplays();
}

function checkAnswer() {
  const regions = getRegions(state.setCount);
  const correctIds = new Set(regions.filter(r => state.currentExpression.fn(r)).map(r => r.id));
  if (correctIds.size !== state.selected.size) return false;
  for (const id of correctIds) if (!state.selected.has(id)) return false;
  return true;
}

function onContinue() {
  if (state.gameEnded) return;

  if (state.answered) {
    loadQuestion();
    return;
  }

  const correct = checkAnswer();
  state.answered = true;
  state.attemptedCount++;

  const fb = document.getElementById('feedback');

  if (correct) {
    const points = BASE_POINTS + STREAK_BONUS * state.streak;
    state.score += points;
    state.streak++;
    state.bestStreak = Math.max(state.bestStreak, state.streak);
    state.correctCount++;

    let msg = `<span class="glyph">✓</span> Correct! <strong>+${points}</strong>`;
    if (state.streak >= 2) msg += ` <span style="opacity:0.7">(streak × ${state.streak})</span>`;
    fb.innerHTML = msg;
    fb.className = 'feedback correct';

    // Show solution shading briefly (reinforcement)
    showSolutionFill();
  } else {
    state.streak = 0;
    fb.innerHTML = `<span class="glyph">✗</span> Not quite. Green = correct regions, red = incorrect.`;
    fb.className = 'feedback incorrect';
    showDiffFill();
  }

  document.getElementById('continueBtn').textContent = 'Next question →';
  document.getElementById('solutionBtn').disabled = true;
  document.getElementById('clearBtn').disabled = true;
  updateDisplays();
}

function onShowSolution() {
  if (state.answered || state.gameEnded) return;
  // Reveal the solution without penalising the streak, but mark as attempted and wrong
  state.answered = true;
  state.attemptedCount++;
  state.streak = 0;

  const fb = document.getElementById('feedback');
  fb.innerHTML = `<span class="glyph">✦</span> Solution shown.`;
  fb.className = 'feedback';
  fb.style.color = 'var(--accent)';

  showSolutionFill();

  document.getElementById('continueBtn').textContent = 'Next question →';
  document.getElementById('solutionBtn').disabled = true;
  document.getElementById('clearBtn').disabled = true;
  updateDisplays();
}

function endGame() {
  state.gameEnded = true;
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
  document.getElementById('active-game').style.display = 'none';
  document.getElementById('game-over').classList.add('show');
  document.getElementById('final-score').textContent = state.score;

  const accuracy = state.attemptedCount > 0
    ? Math.round(100 * state.correctCount / state.attemptedCount)
    : 0;

  document.getElementById('final-breakdown').innerHTML =
    `<em>${state.correctCount}</em> correct of <em>${state.attemptedCount}</em> attempted · ` +
    `accuracy <em>${accuracy}%</em> · best streak <em>${state.bestStreak}</em>`;
}

function updateDisplays() {
  document.getElementById('time-display').textContent = state.timeLeft + 's';
  document.getElementById('score-display').textContent = state.score;
  document.getElementById('streak-display').textContent = state.streak;
  document.getElementById('question-display').textContent = state.questionNum;
}

// ==============================
// EVENT LISTENERS
// ==============================
document.getElementById('newGameBtn').addEventListener('click', newGame);
document.getElementById('playAgainBtn').addEventListener('click', newGame);
document.getElementById('continueBtn').addEventListener('click', onContinue);
document.getElementById('solutionBtn').addEventListener('click', onShowSolution);
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!state.answered && !state.gameEnded) clearAll();
});

// Live-update when selects change (if not mid-game)
['difficulty', 'setCount', 'mode'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    // If the student is mid-game, changing settings starts a new game
    newGame();
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
  if (e.key === 'Enter') {
    e.preventDefault();
    if (state.gameEnded) newGame();
    else onContinue();
  } else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') {
    if (!state.answered && !state.gameEnded) clearAll();
  } else if (e.key === 's' || e.key === 'S') {
    if (!state.answered && !state.gameEnded) onShowSolution();
  }
});

// ==============================
// INIT
// ==============================
newGame();
</script>
</body>
</html>
